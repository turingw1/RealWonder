denoising_step_list:
- 750
- 500
- 250
mask_dropin_step: -1
# Endpoint-gripper fold controller. This avoids prescribing a full side panel
# shape; the side seam/corner and lower hem are moved as virtual contact handles.
fold_strategy: handle_pull
fold_test_mode: side_lift_only
fold_grasp_side: right
fold_side_phase_end: 0.82
fold_bottom_phase_end: 0.96
fold_velocity_damping: 0.92
fold_side_strength: 5.5
fold_bottom_strength: 0.0
fold_handle_edge_band: 0.075
fold_handle_z_min: 0.18
fold_handle_z_max: 0.86
fold_bottom_corner_x_band: 0.16
fold_bottom_corner_z_max: 0.20
fold_side_landing_x_norm: 0.94
fold_side_landing_z_shift: 0.0
fold_handle_lift_amount: 0.10
fold_landing_y_offset: 0.22
fold_handle_position_blend: 0.42
fold_handle_hold_blend: 0.20
fold_passive_carry_start_x_norm: 0.82
fold_passive_drag_blend: 0.018
fold_passive_drag_strength: 0.18
fold_bottom_handle_z_band: 0.0
fold_bottom_handle_x_min: 0.30
fold_bottom_handle_x_max: 0.72
fold_bottom_landing_z_norm: 0.58
fold_bottom_lift_amount: 0.0
fold_bottom_position_blend: 0.0
vgen_prompt: A realistic teal cotton T-shirt is folded on a wooden laundry table.
  The right side seam is gently lifted upward by a small gripper while the rest
  of the shirt stays on the wooden table, with soft wrinkles, cloth inertia, and
  natural fabric settling. Static camera, photorealistic laundry room background.
