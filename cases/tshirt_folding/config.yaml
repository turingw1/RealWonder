inpainting_negative_prompt: shirt, t-shirt, cloth, object
inpainting_prompt: wooden tabletop background, no clothing
pbd_rho: 0.5
pbd_gravity: -0.15
pbd_static_friction: 0.9
pbd_kinetic_friction: 0.25
pbd_stretch_compliance: 0.006
pbd_bending_compliance: 0.12
pbd_stretch_relaxation: 0.55
pbd_bending_relaxation: 0.08
